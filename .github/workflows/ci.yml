name: CI

on:
  push:
    branches: [main]
  pull_request:

# Default-deny: jobs start with no GITHUB_TOKEN permissions and must opt in
# below. Both jobs only need read access to clone the repo.
permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: windows-latest
    permissions:
      contents: read # checkout
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

  audit:
    name: Dependency advisories
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit dependencies
        # RUSTSEC-2023-0071 (rsa "Marvin" timing sidechannel) is not exploitable
        # in Nomad: the `pgp` crate uses RSA only to VERIFY detached signatures
        # (public-key operations), never to decrypt, and there is no fixed
        # upstream `rsa` release. Re-evaluate if a patched `rsa` ships or Nomad's
        # cryptographic usage changes.
        run: cargo audit --ignore RUSTSEC-2023-0071
