name: Scorecard supply-chain security

on:
  branch_protection_rule:
  schedule:
    - cron: "20 7 * * 2" # weekly, Tuesday 07:20 UTC
  push:
    branches: [main]

# Default-deny; the single job opts into exactly what Scorecard needs.
permissions: {}

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload SARIF to the code-scanning dashboard
      id-token: write # publish_results: attest the run to the OpenSSF API
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # publish_results requires a PUBLIC repo. Set to false if Nomad's
          # repository is private, or the run will fail at the publish step.
          publish_results: true

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4
        with:
          sarif_file: results.sarif
